<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儀表板 — 管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">
    <aside class="fixed left-0 top-0 z-40 flex h-screen w-64 flex-col bg-slate-800 shadow-lg" aria-label="後台導覽">
        <header class="border-b border-white/10 px-6 py-5">
            <p class="text-lg font-semibold tracking-wide text-cyan-400">管理後台</p>
        </header>
        <nav class="flex flex-1 flex-col py-4" aria-label="主選單">
            <a href="dashboard.html" class="block border-l-2 border-cyan-400 bg-white/5 px-6 py-3 text-cyan-400 transition-colors duration-200" aria-current="page">儀表板</a>
            <a href="projects.html" class="block border-l-2 border-transparent px-6 py-3 text-slate-300 transition-colors duration-200 hover:bg-white/5 hover:text-white">作品管理</a>
            <a href="messages.html" class="block border-l-2 border-transparent px-6 py-3 text-slate-300 transition-colors duration-200 hover:bg-white/5 hover:text-white">留言管理</a>
            <a href="profile.html" class="block border-l-2 border-transparent px-6 py-3 text-slate-300 transition-colors duration-200 hover:bg-white/5 hover:text-white">個人資料</a>
        </nav>
        <div class="mt-auto border-t border-white/10 p-4">
            <button type="button" onclick="logout()" class="block w-full rounded-lg px-6 py-3 text-left text-slate-400 transition-colors duration-200 hover:text-red-400">登出</button>
        </div>
    </aside>

    <main class="ml-64 min-h-screen bg-slate-900 p-8">
        <header>
            <h1 class="text-2xl font-bold text-white">歡迎回來，管理員！</h1>
        </header>

        <section class="mt-6 grid grid-cols-1 gap-6 md:grid-cols-3" aria-label="統計摘要">
            <article id="stat-projects" class="rounded-xl border border-white/10 bg-slate-800 p-6 transition-all duration-300 hover:border-cyan-400/30">
                <div class="flex items-center gap-4">
                    <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-cyan-400/10 text-cyan-400" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z" />
                        </svg>
                    </div>
                    <div>
                        <p class="stat-number text-3xl font-bold text-white">—</p>
                        <p class="mt-1 text-sm text-slate-400">作品總數</p>
                    </div>
                </div>
            </article>

            <article id="stat-messages" class="rounded-xl border border-white/10 bg-slate-800 p-6 transition-all duration-300 hover:border-cyan-400/30">
                <div class="flex items-center gap-4">
                    <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-cyan-400/10 text-cyan-400" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
                        </svg>
                    </div>
                    <div>
                        <p class="stat-number text-3xl font-bold text-white">—</p>
                        <p class="mt-1 text-sm text-slate-400">留言總數</p>
                    </div>
                </div>
            </article>

            <article id="stat-unread" class="rounded-xl border border-white/10 bg-slate-800 p-6 transition-all duration-300 hover:border-cyan-400/30">
                <div class="flex items-center gap-4">
                    <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-cyan-400/10 text-cyan-400" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                    </div>
                    <div>
                        <p class="stat-number text-3xl font-bold text-cyan-400">—</p>
                        <p class="mt-1 text-sm text-slate-400">未讀留言</p>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <script src="js/auth.js"></script>
    <script>
        checkAuth();

        async function loadStats() {
            try {
                const projectsData = await authFetch(`${API_BASE}/api/projects`);
                if (projectsData && projectsData.success) {
                    document.getElementById('stat-projects').querySelector('.stat-number').textContent = projectsData.data.length;
                }

                const messagesData = await authFetch(`${API_BASE}/api/messages/stats`);
                if (messagesData && messagesData.success) {
                    document.getElementById('stat-messages').querySelector('.stat-number').textContent = messagesData.data.total;
                    document.getElementById('stat-unread').querySelector('.stat-number').textContent = messagesData.data.unread;
                }
            } catch (err) {
                console.error('載入統計資料失敗', err);
            }
        }

        loadStats();
    </script>
</body>
</html>
