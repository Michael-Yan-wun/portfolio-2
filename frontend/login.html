<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作品集 | 管理員登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #mobile-menu:not(.hidden) {
      display: flex;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-900 text-white antialiased flex flex-col">
  <header
    class="fixed top-0 left-0 right-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-white/10"
  >
    <nav class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 md:px-6">
      <a href="index.html" class="text-lg font-semibold tracking-tight text-white">
        Portfolio
      </a>

      <ul class="hidden items-center gap-8 text-sm font-medium md:flex">
        <li>
          <a href="index.html" class="text-slate-300 transition hover:text-white">首頁</a>
        </li>
        <li>
          <a href="projects.html" class="text-slate-300 transition hover:text-white">作品集</a>
        </li>
        <li>
          <a href="about.html" class="text-slate-300 transition hover:text-white">關於我</a>
        </li>
        <li>
          <a href="contact.html" class="text-slate-300 transition hover:text-white">聯絡我</a>
        </li>
        <li>
          <a href="login.html" class="text-cyan-400 transition hover:text-cyan-300">登入</a>
        </li>
      </ul>

      <button
        type="button"
        id="menu-toggle"
        class="inline-flex items-center justify-center rounded-lg border border-white/10 p-2 text-slate-200 md:hidden"
        aria-expanded="false"
        aria-controls="mobile-menu"
        aria-label="開啟選單"
      >
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
    </nav>

    <div
      id="mobile-menu"
      class="hidden flex-col border-t border-white/10 bg-slate-900/95 px-4 py-4 backdrop-blur-md md:hidden"
    >
      <ul class="flex flex-col gap-3 text-sm font-medium">
        <li>
          <a href="index.html" class="block py-2 text-slate-300 hover:text-white">首頁</a>
        </li>
        <li>
          <a href="projects.html" class="block py-2 text-slate-300 hover:text-white">作品集</a>
        </li>
        <li>
          <a href="about.html" class="block py-2 text-slate-300 hover:text-white">關於我</a>
        </li>
        <li>
          <a href="contact.html" class="block py-2 text-slate-300 hover:text-white">聯絡我</a>
        </li>
        <li>
          <a href="login.html" class="block py-2 text-cyan-400">登入</a>
        </li>
      </ul>
    </div>
  </header>

  <main class="flex flex-1 flex-col items-center justify-center px-4 pt-24 pb-12">
    <section
      id="login-card"
      class="w-full max-w-md rounded-xl border border-white/10 bg-white/5 p-8 backdrop-blur-lg"
      aria-labelledby="login-heading"
    >
      <h1
        id="login-heading"
        class="login-stagger bg-gradient-to-r from-cyan-400 to-violet-400 bg-clip-text text-center text-2xl font-bold text-transparent"
      >
        管理員登入
      </h1>
      <p class="login-stagger mt-2 text-center text-slate-400">
        請輸入後台管理帳號與密碼
      </p>

      <form id="login-form" class="mt-8 space-y-5" novalidate>
        <div class="login-stagger">
          <label for="username" class="mb-2 block text-sm font-medium text-slate-300">帳號</label>
          <input
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            required
            class="bg-slate-800/50 border border-white/10 rounded-lg px-4 py-3 text-white w-full focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 focus:outline-none"
          />
        </div>
        <div class="login-stagger">
          <label for="password" class="mb-2 block text-sm font-medium text-slate-300">密碼</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
            class="bg-slate-800/50 border border-white/10 rounded-lg px-4 py-3 text-white w-full focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 focus:outline-none"
          />
        </div>

        <button
          type="submit"
          class="w-full rounded-lg bg-gradient-to-r from-cyan-500 to-violet-500 py-3 font-semibold text-white transition-all duration-300 hover:scale-[1.02] hover:opacity-90"
        >
          登入
        </button>

        <p id="login-error" class="hidden text-center text-sm text-red-400" role="alert"></p>
      </form>
    </section>
  </main>

  <footer class="border-t border-white/10 bg-slate-800">
    <div class="mx-auto flex max-w-6xl flex-col items-center justify-between gap-6 px-4 py-10 md:flex-row md:px-6">
      <p class="text-center text-sm text-slate-400 md:text-left">
        © 2026 志遠 · 保留所有權利。
      </p>
      <div class="flex items-center gap-5">
        <a
          href="https://github.com"
          class="text-slate-400 transition hover:text-cyan-400"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub"
        >
          <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill-rule="evenodd"
              d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
              clip-rule="evenodd"
            />
          </svg>
        </a>
        <a
          href="https://www.linkedin.com"
          class="text-slate-400 transition hover:text-cyan-400"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="LinkedIn"
        >
          <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
            />
          </svg>
        </a>
      </div>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    (function () {
      gsap.registerPlugin(ScrollTrigger);

      gsap.from('#login-card', {
        y: 50,
        opacity: 0,
        duration: 0.8,
        ease: 'power2.out',
      });

      gsap.from('.login-stagger', {
        y: 20,
        opacity: 0,
        duration: 0.6,
        stagger: 0.1,
        ease: 'power2.out',
        delay: 0.15,
      });

      var toggle = document.getElementById('menu-toggle');
      var menu = document.getElementById('mobile-menu');
      toggle.addEventListener('click', function () {
        var open = menu.classList.toggle('hidden') === false;
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        toggle.setAttribute('aria-label', open ? '關閉選單' : '開啟選單');
      });
    })();
  </script>
  <script>
    const API_BASE = 'http://localhost:8000';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      errorEl.classList.add('hidden');

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.data.access_token);
          window.location.href = 'admin/dashboard.html';
        } else {
          errorEl.textContent = data.detail || '登入失敗';
          errorEl.classList.remove('hidden');
        }
      } catch (err) {
        errorEl.textContent = '伺服器連線失敗';
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
